<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exploiter404 &mdash; BootLeak CTF</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#050509;--panel:#0c0c14;--border:#00ff9922;--green:#00ff99;--red:#ff003c;--yellow:#ffe600;--dim:#1e3a2a;--text:#b8f0cc;--muted:#3a6a4a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Share Tech Mono",monospace;height:100vh;display:flex;flex-direction:column;align-items:center;overflow:hidden}
body::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,.13) 3px,rgba(0,0,0,.13) 4px);pointer-events:none;z-index:9999}
header{width:100%;max-width:820px;padding:16px 24px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.corner{position:absolute;width:14px;height:14px;border-color:var(--green);border-style:solid;opacity:.4}
.corner.tl{top:12px;left:12px;border-width:2px 0 0 2px}.corner.tr{top:12px;right:12px;border-width:2px 2px 0 0}
.logo{font-family:"Orbitron",sans-serif;font-size:clamp(1.4rem,4.5vw,2.2rem);font-weight:900;color:var(--green);text-shadow:0 0 20px #00ff9977,0 0 60px #00ff9922;letter-spacing:4px;animation:flicker 7s infinite}
@keyframes flicker{0%,18%,20%,22%,53%,55%,100%{opacity:1}19%,21%,54%{opacity:.5}}
.tagline{font-size:.62rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase}
.status-bar{display:flex;gap:12px;margin-top:4px;font-size:.58rem;color:var(--muted);flex-wrap:wrap;justify-content:center}
.dot-green{color:var(--green)}.dot-red{color:var(--red)}
.divider{width:100%;max-width:820px;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:.2;margin:2px 0}
.chat-wrapper{width:100%;max-width:820px;flex:1;display:flex;flex-direction:column;padding:0 14px;overflow:hidden}
#chat-box{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:11px;padding:12px 2px;scrollbar-width:thin;scrollbar-color:var(--green) transparent}
#chat-box::-webkit-scrollbar{width:4px}#chat-box::-webkit-scrollbar-thumb{background:var(--green);border-radius:2px}
.msg{display:flex;flex-direction:column;gap:3px;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-label{font-size:.56rem;letter-spacing:2px;text-transform:uppercase}
.msg.bot .msg-label{color:var(--green)}.msg.user .msg-label{color:var(--yellow);text-align:right}
.msg-bubble{padding:9px 14px;font-size:.81rem;line-height:1.65;max-width:88%;background:var(--panel);border:1px solid var(--border)}
.msg.bot .msg-bubble{align-self:flex-start;border-left:2px solid var(--green);color:var(--text)}
.msg.user .msg-bubble{align-self:flex-end;border-right:2px solid var(--yellow);border-left:none;color:var(--yellow);background:#100e00}
.msg.bot.error .msg-bubble{border-left-color:var(--red);color:#ff6688;background:#120008;border-color:#ff003c22}
.msg.bot.flag .msg-bubble{border-left-color:var(--green);color:var(--green);background:#001510;border-color:#00ff9944;white-space:pre-wrap;font-size:.78rem;animation:flagPulse 2s infinite alternate;box-shadow:0 0 30px #00ff9933}
@keyframes flagPulse{from{box-shadow:0 0 12px #00ff9922}to{box-shadow:0 0 40px #00ff9966}}
.typing-dots span{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin:0 2px;animation:blink 1.1s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:1}}
.input-row{display:flex;gap:8px;padding:10px 0 12px;align-items:center;border-top:1px solid var(--border)}
.prompt-prefix{color:var(--green);font-size:.82rem;white-space:nowrap;user-select:none;opacity:.8}
#user-input{flex:1;background:transparent;border:none;outline:none;color:var(--yellow);font-family:"Share Tech Mono",monospace;font-size:.82rem;caret-color:var(--green)}
#user-input::placeholder{color:var(--dim)}
#send-btn{background:transparent;color:var(--green);border:1px solid var(--green);padding:7px 16px;font-family:"Orbitron",sans-serif;font-size:.58rem;font-weight:700;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .15s}
#send-btn:hover{background:var(--green);color:#000;box-shadow:0 0 14px #00ff9966}
#send-btn:disabled{opacity:.3;cursor:not-allowed;background:transparent;color:var(--muted);border-color:var(--muted);box-shadow:none}
.hint-bar{font-size:.56rem;color:var(--muted);text-align:center;padding-bottom:8px;letter-spacing:1.5px}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-5px)}60%{transform:translateX(5px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}
.shake{animation:shake .45s ease}
.fail-flash{position:fixed;inset:0;background:rgba(255,0,60,.07);pointer-events:none;z-index:9997;animation:ffout .5s forwards}
.win-overlay{position:fixed;inset:0;background:rgba(0,255,153,.06);pointer-events:none;z-index:9997;animation:wflash 1s forwards}
@keyframes ffout{from{opacity:1}to{opacity:0}}
@keyframes wflash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
</style>
</head>

async function handleSend(){

  inp.value=""; btn.disabled=true;
  addMsg("user",text);
  var result=getBotReply(text);
  if(!result){btn.disabled=false; inp.focus(); return;}
  var typing=addTyping();
  await sleep(600+Math.random()*600);
  chatBox.removeChild(typing);
  if(result.type==="fail"){
    playFahh(); addFlash("fail-flash");
    document.querySelector(".chat-wrapper").classList.add("shake");
    setTimeout(function(){document.querySelector(".chat-wrapper").classList.remove("shake");},500);

  } else if(result.type==="flag"){
    playWin(); addFlash("win-overlay"); addMsg("bot",result.reply,"flag");
  } else {
    addMsg("bot",result.reply);

  btn.disabled=false; inp.focus();
}
